  le.innerHTML=items.map(function(l){return'<div class=\"pan-item\"><span class=\"pan-health-dot\" data-state=\"idle\"></span><span class=\"pan-type\">'+esc(l.label)+'</span><div class=\"pan-info\"><div class=\"pan-name\">'+esc(l.label)+'</div><div class=\"pan-url\">'+esc(l.url)+'</div></div><div class=\"pan-actions\"><button class=\"pan-open-btn\" data-url=\"'+esc(l.url)+'\" data-type=\"'+esc(l.type)+'\">打开</button></div></div>'}).join('');
  le.querySelectorAll('.pan-open-btn').forEach(function(b){b.onclick=function(){pr(b.dataset.url,b.dataset.type)}});
  startHealthCheck(p,by,type);
}
var PAN_CHECK_TYPES={quark:1,baidu:1,uc:1,aliyun:1,tianyi:1,xunlei:1,'123':1,'115':1};
function startHealthCheck(p,by,activeType){
  sk().then(function(fm){
    if(!fm||!fm.pan||!fm.pan.check)return;
    var allItems=[];
    var keys=Object.keys(by);
    for(var ki=0;ki<keys.length;ki++){(by[keys[ki]].items||[]).forEach(function(it){if(PAN_CHECK_TYPES[it.type])allItems.push(it)})}
    if(!allItems.length)return;
    for(var s=0;s<allItems.length;s+=10){
      var batch=allItems.slice(s,s+10);
      (function(batchItems,startIdx){
        fm.pan.check(batchItems.map(function(it){return{type:it.type,url:it.url,password:''}})).then(function(res){
          if(!res||!res.results)return;
          res.results.forEach(function(r,idx){
            if(startIdx+idx>=allItems.length)return;
            var targetUrl=allItems[startIdx+idx].url;
            if(!targetUrl)return;
            // 失效的链接从 by 中移除并隐藏 DOM
            if(r.state==='bad'){
              // 从 by 中移除
              for(var tk in by){
                var itemsArr=by[tk].items;
                for(var ii=itemsArr.length-1;ii>=0;ii--){
                  if(itemsArr[ii].url===targetUrl)itemsArr.splice(ii,1);
                }
                if(itemsArr.length===0)delete by[tk];
              }
              // 从 DOM 中移除
              var items=p.querySelectorAll('.pan-item');
              for(var di=0;di<items.length;di++){
                var btn=items[di].querySelector('.pan-open-btn');
                if(btn&&btn.dataset.url===targetUrl){items[di].style.display='none';break}
              }
              // 更新 tab 上的数量
              var tabs=p.querySelectorAll('.pan-search-tab');
              for(var ti=0;ti<tabs.length;ti++){
                var t=tabs[ti];
                var tk=t.dataset.type;
                if(by[tk])t.textContent=(by[tk].label||tk)+' '+by[tk].items.length;
                else t.style.display='none';
              }
            }else{
              // 有效或待确认的：更新绿点
              var items=p.querySelectorAll('.pan-item');
              for(var di=0;di<items.length;di++){
                var btn=items[di].querySelector('.pan-open-btn');
                if(btn&&btn.dataset.url===targetUrl){
                  var dot=items[di].querySelector('.pan-health-dot');
                  if(dot)dot.dataset.state=r.state||'uncertain';
                  break;
                }
              }
            }
          });
        }).catch(function(){});
      })(batch,s);
    }
  });
}
function sp(kw){

function spc(box,type,list){

  le.querySelectorAll('.pan-open-btn').forEach(function(b){b.onclick=function(){pr(b.dataset.url,b.dataset.type)}});
}
var _sg=0;
function ds(){
  var kw=cl($('#kw').value);if(!kw){toa('输入关键词');return}
  var ge=++_sg;st.textContent='搜索：'+kw;c.innerHTML='<div class="loading">搜索中…</div>';
  var chs=cfg&&cfg.ch?cfg.ch:[];if(!chs.length){c.innerHTML='<div class="empty">请先添加频道</div>';return}
  var ba=(cfg&&cfg.px?cfg.px:D_PROXY).replace(/\/+$/,'');
  var al=[],dn=0;
  function fn(){if(ge!==_sg)return;
    var kw2=cl($('#kw').value);
    var merged={};
    for(var i=0;i<al.length;i++){
      var r=al[i];
      if(kw2&&r.title.indexOf(kw2)<0)continue;
      if(!merged[kw2])merged[kw2]={title:kw2,desc:'',tags:[],channel:r.channel,links:[]};
      for(var j=0;j<r.links.length;j++){
        var found=false;
        for(var k=0;k<merged[kw2].links.length;k++){if(merged[kw2].links[k].url===r.links[j].url){found=true;break}}
        if(!found)merged[kw2].links.push(r.links[j]);
      }
    }
    var uq=[];for(var k in merged)uq.push(merged[k]);
    rl(uq);st.textContent='搜索：'+(kw2||kw)+' · '+uq.length+' 条'}
  // 并发池限流，一次最多跑 5 个
  var poolSize=5;
  var idx=0;
  function worker(){
    while(idx<chs.length){
      var ci=idx++;var ch=chs[ci];
      var url=ba+'/'+ch+'?q='+encodeURIComponent(kw);
      doreq(url).then(function(h){if(ge!==_sg)return;al=al.concat(pt(h,ch));dn++;if(dn===chs.length)fn()},function(){if(ge!==_sg)return;dn++;if(dn===chs.length)fn()});
    }
  }
  for(var w=0;w<Math.min(poolSize,chs.length);w++)worker();
}
function pr(url,type){

}
